<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anfibios de Costa Rica — Guía Natural Interactiva</title>
<meta name="description" content="Guía interactiva de anfibios de Costa Rica con fotografías reales, mapas de distribución, comparación de tamaños y sonidos.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f5ef;--bg2:#f0ece4;--surface:#fff;--surface2:#faf7f2;
  --border:#ddd8ce;--border2:#e8e4db;
  --text:#1a1a2e;--text2:#4a4a5a;--text3:#8a8a96;
  --green:#2d6a4f;--green2:#40916c;--green3:#e8f5e9;
  --red:#c1272d;--gold:#b8860b;--blue:#2c5282;--cyan:#0891b2;
  --font-head:'Playfair Display',Georgia,serif;
  --font-body:'Source Sans 3','Segoe UI',sans-serif;
  --font-sci:'EB Garamond','Times New Roman',serif;
  --font-mono:'JetBrains Mono',monospace;
  --radius:10px;--shadow:0 2px 12px rgba(0,0,0,.07);
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.65}
h1,h2,h3{font-family:var(--font-head)}
a{color:var(--green);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:var(--font-body);cursor:pointer;border:none;background:none;color:var(--text)}
img{max-width:100%;display:block}

/* Header */
header{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header-inner{max-width:1200px;margin:0 auto;padding:10px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo{display:flex;align-items:baseline;gap:10px}
.logo h1{font-size:22px;font-weight:700;color:var(--green)}
.logo .sub{font-size:12px;color:var(--text3);font-family:var(--font-body);font-weight:400;letter-spacing:.5px}
.lang-toggle{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-left:auto}
.lang-btn{padding:6px 12px;font-size:12px;font-weight:600;transition:.2s;border-right:1px solid var(--border)}
.lang-btn:last-child{border-right:none}
.lang-btn.active{background:var(--green);color:#fff}
.lang-btn:hover:not(.active){background:var(--bg2)}
.nav-views{display:flex;gap:2px;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.nav-btn{padding:6px 14px;font-size:13px;font-weight:500;transition:.2s}
.nav-btn.active{background:var(--green);color:#fff}
.nav-btn:hover:not(.active){background:var(--bg2)}
.search-box{display:flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:6px;padding:5px 12px;min-width:180px;transition:.2s}
.search-box:focus-within{border-color:var(--green);box-shadow:0 0 0 2px rgba(45,106,79,.12)}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-size:13px;width:100%}
.search-box input::placeholder{color:var(--text3)}

/* Subtitle Bar */
.info-bar{max-width:1200px;margin:0 auto;padding:14px 24px 0;display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.stat{font-size:13px;color:var(--text2)}.stat b{color:var(--green)}
.filter-pills{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
.pill{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);transition:.2s}
.pill:hover,.pill.active{border-color:var(--green);color:var(--green);background:var(--green3)}

/* Grid */
#grid-view{max-width:1200px;margin:0 auto;padding:20px 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}

/* Card */
.card{background:var(--surface);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .3s,box-shadow .3s;border:1px solid var(--border2)}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,.1)}
.card-img{width:100%;aspect-ratio:4/3;background:var(--bg2);overflow:hidden;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.card:hover .card-img img{transform:scale(1.05)}
.card-img .placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:64px;background:linear-gradient(135deg,var(--bg2),var(--surface2))}
.card-num{position:absolute;top:8px;left:10px;font-family:var(--font-mono);font-size:11px;background:rgba(255,255,255,.85);padding:1px 7px;border-radius:4px;color:var(--text2);backdrop-filter:blur(4px)}
.card-iucn{position:absolute;top:8px;right:10px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;backdrop-filter:blur(4px)}
.iucn-lc{background:rgba(45,106,79,.15);color:var(--green)}
.iucn-dd{background:rgba(138,138,150,.15);color:var(--text3)}
.card-body{padding:14px 16px}
.card-common{font-family:var(--font-head);font-size:15px;font-weight:600;line-height:1.3;color:var(--text)}
.card-sci{font-family:var(--font-sci);font-size:13px;color:var(--green);font-style:italic;margin-top:2px}
.card-meta{display:flex;gap:12px;font-size:12px;color:var(--text3);margin-top:8px}
.card-family{font-size:11px;color:var(--text3);margin-top:4px;font-family:var(--font-mono)}
.card-badge{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px;margin-top:6px;background:rgba(193,39,45,.1);color:var(--red)}
.card-sound{position:absolute;bottom:8px;right:8px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:14px;transition:.2s;backdrop-filter:blur(4px);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.card-sound:hover{background:var(--green);color:#fff;transform:scale(1.1)}
.card-sound.playing{background:var(--green);color:#fff;animation:pulse-ring 1.5s infinite}
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(45,106,79,.3)}100%{box-shadow:0 0 0 12px transparent}}

/* Detail Overlay */
#detail{position:fixed;inset:0;z-index:200;background:var(--bg);overflow-y:auto;display:none}
#detail.open{display:block}
.det-inner{max-width:1100px;margin:0 auto;padding:20px 24px 60px}
.det-top{display:flex;align-items:center;gap:12px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:14px}
.det-back{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;transition:.2s}
.det-back:hover{background:var(--green);color:#fff;border-color:var(--green)}
.det-num{font-family:var(--font-mono);color:var(--text3);font-size:12px}
.det-name{font-family:var(--font-head);font-size:24px;font-weight:700;flex:1}
.det-lang{margin-left:0!important;flex-shrink:0}
.det-arrows{display:flex;gap:6px}
.det-arrow{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;transition:.2s}
.det-arrow:hover{background:var(--green);color:#fff;border-color:var(--green)}

.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}

/* Photo Panel */
.det-photo{border-radius:var(--radius);overflow:hidden;background:var(--surface);border:1px solid var(--border2);position:relative}
.det-photo-main{width:100%;aspect-ratio:4/3;background:var(--bg2);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.det-photo-main img{width:100%;height:100%;object-fit:cover;cursor:zoom-in;transition:transform .3s}
.det-photo-main img:hover{transform:scale(1.03)}
.det-photo-main .ph{font-size:80px}
.det-photo-thumbs{display:flex;gap:4px;padding:6px;background:var(--surface2);overflow-x:auto}
.det-photo-thumbs img{width:60px;height:45px;object-fit:cover;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:.2s;opacity:.7;flex-shrink:0}
.det-photo-thumbs img:hover,.det-photo-thumbs img.active{opacity:1;border-color:var(--green)}
.det-viewer-tabs{display:flex;gap:4px;padding:6px 6px 0;background:var(--surface2)}
.vtab{font-size:11px;font-weight:600;padding:5px 11px;border-radius:6px 6px 0 0;color:var(--text2);background:var(--bg2);display:flex;align-items:center;gap:5px}
.vtab.active{background:var(--surface);color:var(--green);box-shadow:0 -2px 0 var(--green) inset}
.vtab-n{font-size:10px;background:var(--green3);color:var(--green);border-radius:8px;padding:0 5px;font-weight:700}
.vtab-3d[disabled]{opacity:.5;cursor:not-allowed}
.vtab-3d:not([disabled]){cursor:pointer}
.vtab-new{background:var(--red)!important;color:#fff!important;font-size:8px!important;letter-spacing:.5px}
.det-3d-wrap{position:relative;width:100%;aspect-ratio:4/3;background:linear-gradient(160deg,#eef3ee,#dfe9e0)}
.det-3d-wrap model-viewer{width:100%;height:100%;--poster-color:transparent}
.det-3d-hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--text2);background:rgba(255,255,255,.8);padding:2px 8px;border-radius:10px;backdrop-filter:blur(4px);pointer-events:none}
.det-3d-loading{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text3);background:var(--surface2)}
.photo-count{position:absolute;bottom:8px;left:8px;font-size:11px;font-family:var(--font-mono);background:rgba(255,255,255,.85);padding:1px 7px;border-radius:4px;color:var(--text2);backdrop-filter:blur(4px)}
.det-photo-credit{font-size:10px;color:var(--text3);padding:6px 10px;background:var(--surface2);border-top:1px solid var(--border2)}
.photo-nav{position:absolute;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;transition:.2s;backdrop-filter:blur(4px)}
.photo-nav:hover{background:var(--green);color:#fff}
.photo-nav.prev{left:8px}
.photo-nav.next{right:8px}

/* Bio Panel */
.det-bio{display:flex;flex-direction:column;gap:16px}
.bio-card{background:var(--surface);border-radius:var(--radius);padding:16px;border:1px solid var(--border2)}
.bio-card h3{font-size:14px;color:var(--green);margin-bottom:10px;display:flex;align-items:center;gap:6px;letter-spacing:.5px}
.bio-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid var(--border2)}
.bio-row:last-child{border:none}
.bio-label{color:var(--text3)}
.bio-val{font-weight:500;text-align:right;max-width:55%}
.bio-val.sci{font-family:var(--font-sci);font-style:italic;color:var(--green)}
.bio-desc{font-size:14px;color:var(--text2);line-height:1.75}
.bio-fact{font-size:13px;color:var(--green2);margin-top:8px;padding:8px 10px;background:var(--green3);border-radius:6px;border-left:3px solid var(--green)}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-right:4px}
.tag-noc{background:#e8eaf6;color:var(--blue)}.tag-diu{background:#fff8e1;color:var(--gold)}
.tag-arb{background:var(--green3);color:var(--green)}.tag-ter{background:#f3e5f5;color:#7b1fa2}
.tag-tox{background:#ffebee;color:var(--red)}.tag-aqu{background:#e0f7fa;color:var(--cyan)}

/* Sound */
.snd-card{background:var(--surface);border-radius:var(--radius);padding:16px;border:1px solid var(--border2)}
.snd-card h3{font-size:14px;color:var(--green);margin-bottom:10px}
.snd-desc{font-size:13px;color:var(--text2);padding:8px 10px;background:var(--surface2);border-radius:6px;border-left:3px solid var(--green);margin-bottom:10px}
.snd-list{display:flex;flex-direction:column;gap:10px}
.snd-item{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:10px}
.snd-item-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:7px}
.snd-src{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.3px}
.snd-src-xc{background:rgba(45,106,79,.14);color:var(--green)}
.snd-src-inat{background:rgba(8,145,178,.14);color:var(--cyan)}
.snd-type{font-size:11px;color:var(--text2);font-style:italic}
.snd-loc{font-size:11px;color:var(--text3);margin-left:auto}
.snd-item audio{width:100%;height:34px;display:block}
.snd-cred{font-size:10px;color:var(--text3);margin-top:6px;line-height:1.4}
.snd-cred a{color:var(--green)}
.snd-none{font-size:13px;color:var(--text3);padding:10px;background:var(--surface2);border-radius:8px;text-align:center}
.card-sound.noaudio,.list-snd.noaudio{opacity:.4;cursor:default}
.card-sound.noaudio:hover{background:rgba(255,255,255,.9);color:inherit;transform:none}
.list-snd.noaudio:hover{background:none;color:inherit;border-color:var(--border)}

/* Anatomy */
.anat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.anat-item{background:var(--surface2);padding:10px;border-radius:6px}
.anat-item h4{font-size:11px;color:var(--green);font-family:var(--font-mono);margin-bottom:3px;font-weight:600}
.anat-item p{font-size:12px;color:var(--text2);line-height:1.4}

/* Size */
.size-card{background:var(--surface);border-radius:var(--radius);padding:16px;border:1px solid var(--border2)}
.size-card h3{font-size:14px;color:var(--green);margin-bottom:10px}
.size-display{display:flex;align-items:flex-end;justify-content:center;gap:28px;padding:16px;background:var(--surface2);border-radius:8px;min-height:100px}
.size-item{display:flex;flex-direction:column;align-items:center;gap:4px}
.size-circle{border-radius:50%;border:2px solid}
.size-frog{border-color:var(--green);background:rgba(45,106,79,.08);display:flex;align-items:center;justify-content:center}
.size-frog-photo{border-radius:10px;overflow:hidden;border:2px solid var(--green);box-shadow:0 2px 8px rgba(0,0,0,.15)}
.size-frog-photo img{width:100%;height:100%;object-fit:cover}
.size-coin{border-color:var(--gold);background:rgba(184,134,11,.08);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--gold)}
.size-label{font-size:10px;color:var(--text3);text-align:center}
.size-btns{display:flex;gap:4px;justify-content:center;margin-top:8px}
.size-btn{padding:4px 10px;border-radius:4px;font-size:11px;border:1px solid var(--border);transition:.2s}
.size-btn:hover,.size-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(184,134,11,.06)}

/* Map */
.map-card{background:var(--surface);border-radius:var(--radius);padding:16px;border:1px solid var(--border2);grid-column:1/-1}
.map-card h3{font-size:14px;color:var(--green);margin-bottom:10px}
.map-wrap{display:flex;gap:20px;flex-wrap:wrap}
.map-svg{flex:1;min-width:280px;background:var(--surface2);border-radius:8px;padding:12px}
.map-svg svg{width:100%;height:auto}
.map-svg svg path{transition:fill .3s,stroke .3s}
.map-info{flex:0 0 180px;display:flex;flex-direction:column;gap:4px}
.map-prov{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.map-dot{width:10px;height:10px;border-radius:2px}
.map-dot.on{background:var(--green)}.map-dot.off{background:var(--border)}
.map-elev{font-size:12px;color:var(--text2);margin-top:10px;padding:8px;background:var(--surface2);border-radius:6px}

/* List View */
#list-view{max-width:900px;margin:0 auto;padding:16px 24px;display:none}
.list-head{margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--green)}
.list-head h2{font-size:18px;color:var(--green)}.list-head p{font-size:12px;color:var(--text3)}
.list-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;background:var(--surface);margin-bottom:4px;border:1px solid var(--border2);transition:.2s;cursor:pointer}
.list-row:hover{border-color:var(--green);box-shadow:var(--shadow)}
.list-num{font-family:var(--font-mono);color:var(--text3);font-size:11px;min-width:32px}
.list-photo{width:44px;height:44px;border-radius:6px;object-fit:cover;background:var(--bg2);flex-shrink:0}
.list-names{flex:1;min-width:0}
.list-common{font-size:14px;font-weight:600}
.list-sci{font-family:var(--font-sci);font-size:12px;color:var(--green);font-style:italic}
.list-snd{width:34px;height:34px;min-width:34px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;transition:.2s}
.list-snd:hover{background:var(--green);color:#fff;border-color:var(--green)}
.list-snd.playing{background:var(--green);color:#fff;animation:pulse-ring 1.5s infinite}
.list-size{font-size:11px;color:var(--text3);font-family:var(--font-mono);min-width:55px;text-align:right}

/* Footer */
footer{text-align:center;padding:32px 24px;color:var(--text3);font-size:12px;border-top:1px solid var(--border);margin-top:32px}

/* Lightbox */
#lightbox{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;cursor:zoom-out}
#lightbox.open{display:flex}
#lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:4px}

/* Responsive */
@media(max-width:768px){
  .header-inner{gap:8px}.logo h1{font-size:18px}
  .det-grid{grid-template-columns:1fr}
  #grid-view{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
  .map-wrap{flex-direction:column}.map-info{flex:none}
  .anat-grid{grid-template-columns:1fr}
  .det-name{font-size:18px}
}
@media(max-width:480px){
  #grid-view{grid-template-columns:1fr;padding:12px}
  header .search-box{min-width:100%}
}
</style>
</head>
<body>
<header>
 <div class="header-inner">
  <div class="logo">
   <h1 data-t="title">Anfibios de Costa Rica</h1>
   <span class="sub" data-t="subtitle">Guía Natural Interactiva</span>
  </div>
  <div class="lang-toggle">
   <button class="lang-btn active" data-lang="es">ES</button>
   <button class="lang-btn" data-lang="en">EN</button>
   <button class="lang-btn" data-lang="fr">FR</button>
  </div>
  <nav class="nav-views">
   <button class="nav-btn active" data-view="grid" data-t="catalog">Catálogo</button>
   <button class="nav-btn" data-view="list" data-t="fieldGuide">Guía de Campo</button>
  </nav>
  <div class="search-box">
   <span>🔍</span>
   <input id="search" type="text" data-t-ph="searchPh" placeholder="Buscar especie...">
  </div>
 </div>
</header>
<div class="info-bar">
 <span class="stat"><b id="sp-count">21</b> <span data-t="speciesReg">especies registradas</span></span>
 <span class="stat"><b>7</b> <span data-t="families">familias</span></span>
 <div class="filter-pills">
  <button class="pill active" data-f="all" data-t="all">Todos</button>
  <button class="pill" data-f="rana" data-t="frogs">Ranas</button>
  <button class="pill" data-f="sapo" data-t="toads">Sapos</button>
  <button class="pill" data-f="noc" data-t="nocturnal">Nocturnos</button>
  <button class="pill" data-f="diu" data-t="diurnal">Diurnos</button>
  <button class="pill" data-f="tox" data-t="toxic">Tóxicos</button>
 </div>
</div>

<div id="grid-view"></div>
<div id="list-view">
 <div class="list-head"><h2 data-t="fieldGuideTitle">Guía de Campo Sonora</h2><p data-t="fieldGuideSub">Reproduce los cantos para identificación en campo</p></div>
 <div id="list-rows"></div>
</div>

<!-- Detail -->
<div id="detail">
 <div class="det-inner">
  <div class="det-top">
   <button class="det-back" id="det-close">←</button>
   <span class="det-num" id="det-num"></span>
   <h2 class="det-name" id="det-name"></h2>
   <div class="lang-toggle det-lang">
    <button class="lang-btn" data-lang="es">ES</button>
    <button class="lang-btn" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="fr">FR</button>
   </div>
   <div class="det-arrows">
    <button class="det-arrow" id="det-prev">◀</button>
    <button class="det-arrow" id="det-next">▶</button>
   </div>
  </div>
  <div class="det-grid">
   <div class="det-photo" id="det-photo"></div>
   <div class="det-bio" id="det-bio"></div>
   <div class="snd-card" id="det-snd"></div>
   <div class="bio-card" id="det-anat"></div>
   <div class="size-card" id="det-size"></div>
   <div class="map-card" id="det-map"></div>
  </div>
 </div>

{id:11,sci:"Tlalocohyla loquax",fam:"Hylidae",ord:"Anura",n:{es:"Rana Arbórea Locuaz",en:"Mahogany Treefrog",fr:"Rainette bavarde"},sMin:25,sMax:38,elev:"0–1,200 m",iucn:"LC",act:"noc",tox:false,type:"tree",hab:{es:"Dosel del bosque, charcos temporales",en:"Forest canopy, temporary ponds",fr:"Canopée forestière, mares temporaires"},diet:{es:"Insectos, artrópodos pequeños",en:"Insects, small arthropods",fr:"Insectes, petits arthropodes"},desc:{es:"Extremadamente vocal. Coros rápidos de chasquidos inconfundibles en bosques de tierras bajas.",en:"Extremely vocal. Rapid clicking choruses unmistakable in lowland forests.",fr:"Extrêmement vocale. Les chœurs rapides de claquements sont incomparables dans les forêts de basse altitude."},fact:{es:"'Loquax' en latín significa 'parlanchín' — nombre muy merecido.",en:"'Loquax' in Latin means 'talkative' — a well-deserved name.",fr:"'Loquax' en latin signifie 'bavard' — un nom bien mérité."},call:{es:"Chasquidos rápidos 'clack-clack-clack' como matraca.",en:"Rapid 'clack-clack-clack' clicks like a ratchet.",fr:"Claquements rapides 'clack-clack-clack' comme une crécelle."},freq:"3.0–5.0 kHz",anat:{es:{e:"Grandes, dorados",p:"Lisa, verde intenso",pa:"Largas y delgadas con ventosas",c:"Pequeño, ágil"},en:{e:"Large, golden",p:"Smooth, intense green",pa:"Long and thin with toe pads",c:"Small, agile"},fr:{e:"Grands, dorés",p:"Lisse, vert intense",pa:"Longues et fines avec ventouses",c:"Petit, agile"}},reg:["ca","zn"],emoji:"📢",img:"tlalocohyla-loquax.jpg"},
{id:12,sci:"Lithobates warszewitschii",fam:"Ranidae",ord:"Anura",n:{es:"Rana Brillante de Bosque",en:"Brilliant Forest Frog",fr:"Grenouille brillante de forêt"},sMin:40,sMax:65,elev:"0–1,500 m",iucn:"LC",act:"diu",tox:false,type:"true",hab:{es:"Arroyos en bosque primario y secundario",en:"Streams in primary and secondary forest",fr:"Ruisseaux en forêt primaire et secondaire"},diet:{es:"Insectos, invertebrados acuáticos",en:"Insects, aquatic invertebrates",fr:"Insectes, invertébrés aquatiques"},desc:{es:"Dorso verde metálico espectacular. Habita junto a arroyos donde caza activamente.",en:"Spectacular metallic green dorsum. Lives near streams where it actively hunts.",fr:"Dos vert métallique spectaculaire. Habite près des ruisseaux où elle chasse activement."},fact:{es:"Nombrada en honor al explorador polaco Josef von Warszewicz.",en:"Named after the Polish explorer Josef von Warszewicz.",fr:"Nommée en l'honneur de l'explorateur polonais Josef von Warszewicz."},call:{es:"'Tac' corto y espaciado junto a arroyos.",en:"Short, spaced 'tac' near streams.",fr:"'Tac' court et espacé près des ruisseaux."},freq:"2.0–3.0 kHz",anat:{es:{e:"Prominentes, oscuros con anillo dorado",p:"Lisa, verde metálico brillante",pa:"Largas y musculosas",c:"Atlético, forma clásica de rana"},en:{e:"Prominent, dark with golden ring",p:"Smooth, brilliant metallic green",pa:"Long and muscular",c:"Athletic, classic frog shape"},fr:{e:"Proéminents, sombres avec anneau doré",p:"Lisse, vert métallique brillant",pa:"Longues et musclées",c:"Athlétique, forme classique de grenouille"}},reg:["pc","ps","zn","ca"],emoji:"✨",img:"lithobates-warszewitschii.jpg"},
{id:13,sci:"Lithobates forreri",fam:"Ranidae",ord:"Anura",n:{es:"Rana Leopardo de Forrer",en:"Forrer's Leopard Frog",fr:"Grenouille léopard de Forrer"},sMin:45,sMax:90,elev:"0–1,600 m",iucn:"LC",act:"noc",tox:false,type:"true",hab:{es:"Lagunas, pantanos, ríos, potreros inundados",en:"Lagoons, marshes, rivers, flooded pastures",fr:"Lagunes, marécages, rivières, pâturages inondés"},diet:{es:"Insectos, artrópodos, pequeños vertebrados",en:"Insects, arthropods, small vertebrates",fr:"Insectes, arthropodes, petits vertébrés"},desc:{es:"La rana leopardo de la vertiente Pacífica. Grande y ágil, salta distancias impresionantes.",en:"The Pacific slope leopard frog. Large and agile, leaps impressive distances.",fr:"La grenouille léopard du versant Pacifique. Grande et agile, saute des distances impressionnantes."},fact:{es:"Puede saltar hasta 2 metros — más de 20 veces su longitud corporal.",en:"Can leap up to 2 meters — more than 20 times its body length.",fr:"Peut sauter jusqu'à 2 mètres — plus de 20 fois sa longueur corporelle."},call:{es:"Gruñido gutural 'chuck-chuck' grave.",en:"Deep guttural 'chuck-chuck' grunt.",fr:"Grognement guttural 'chuck-chuck' grave."},freq:"0.8–2.0 kHz",anat:{es:{e:"Grandes, dorado-verdoso",p:"Lisa con pliegues dorsolaterales, manchas oscuras",pa:"Muy largas, potentes",c:"Grande, robusto"},en:{e:"Large, greenish-golden",p:"Smooth with dorsolateral folds, dark spots",pa:"Very long, powerful",c:"Large, robust"},fr:{e:"Grands, doré-verdâtre",p:"Lisse avec plis dorsolatéraux, taches sombres",pa:"Très longues, puissantes",c:"Grand, robuste"}},reg:["pn","pc"],emoji:"🐆",img:"lithobates-forreri.jpg"},
{id:14,sci:"Leptodactylus savagei",fam:"Leptodactylidae",ord:"Anura",n:{es:"Rana Toro",en:"Savage's Thin-toed Frog",fr:"Grenouille taureau"},sMin:100,sMax:185,elev:"0–1,200 m",iucn:"LC",act:"noc",tox:false,type:"ground",hab:{es:"Suelo de bosque, orillas de ríos y charcos",en:"Forest floor, river and pond edges",fr:"Sol de forêt, bords de rivières et mares"},diet:{es:"Insectos grandes, ranas, lagartijas, ratones",en:"Large insects, frogs, lizards, mice",fr:"Gros insectes, grenouilles, lézards, souris"},desc:{es:"La rana más grande de Costa Rica. Canto nocturno potente que resuena a gran distancia.",en:"The largest frog in Costa Rica. Powerful nocturnal call resonates over long distances.",fr:"La plus grande grenouille du Costa Rica. Chant nocturne puissant qui résonne à grande distance."},fact:{es:"Las hembras construyen nidos de espuma para proteger los huevos.",en:"Females build foam nests to protect eggs from predators and desiccation.",fr:"Les femelles construisent des nids de mousse pour protéger les œufs."},call:{es:"'WUUUUP' profundo y resonante. Se escucha a cientos de metros.",en:"Deep resonant 'WUUUUP'. Audible hundreds of meters away.",fr:"'WUUUUP' profond et résonant. Audible à des centaines de mètres."},freq:"0.3–1.0 kHz",anat:{es:{e:"Grandes, dorado",p:"Lisa a rugosa, pliegues laterales",pa:"Muy robustas y musculosas",c:"El más grande de CR (hasta 18.5 cm)"},en:{e:"Large, golden",p:"Smooth to rough, lateral folds",pa:"Very robust and muscular",c:"Largest in CR (up to 18.5 cm)"},fr:{e:"Grands, dorés",p:"Lisse à rugueuse, plis latéraux",pa:"Très robustes et musclées",c:"Le plus grand du CR (jusqu'à 18,5 cm)"}},reg:["pn","pc","ps","zn","ca"],emoji:"🐂",img:"leptodactylus-savagei.jpg"},
{id:15,sci:"Rhinella marina",fam:"Bufonidae",ord:"Anura",n:{es:"Sapo de Caña",en:"Cane Toad",fr:"Crapaud buffle"},sMin:100,sMax:240,elev:"0–2,000 m",iucn:"LC",act:"noc",tox:true,type:"toad",hab:{es:"Áreas abiertas, jardines, borde de bosque, urbano",en:"Open areas, gardens, forest edge, urban",fr:"Zones ouvertes, jardins, lisière de forêt, urbain"},diet:{es:"Omnívoro: insectos, carroña, otros sapos",en:"Omnivore: insects, carrion, other toads",fr:"Omnivore: insectes, charogne, autres crapauds"},desc:{es:"El sapo más grande de las Américas. Glándulas parotoides secretan bufotoxina. Muy común.",en:"The largest toad in the Americas. Parotoid glands secrete bufotoxin. Very common.",fr:"Le plus grand crapaud des Amériques. Les glandes parotoïdes sécrètent de la bufotoxine."},fact:{es:"Especie invasora devastadora en Australia. En Costa Rica es nativo. Su veneno puede matar perros.",en:"Devastating invasive species in Australia. Native to Costa Rica. Its venom can kill dogs.",fr:"Espèce envahissante dévastatrice en Australie. Originaire du Costa Rica. Son venin peut tuer les chiens."},call:{es:"Trino profundo y prolongado 'brrrrrrrr'.",en:"Deep, prolonged trill 'brrrrrrrr'.",fr:"Trille profond et prolongé 'brrrrrrrr'."},freq:"0.5–1.5 kHz",anat:{es:{e:"Medianos, iris dorado",p:"Muy verrugosa, grandes glándulas parotoides",pa:"Cortas y robustas",c:"Masivo (hasta 24 cm), el más pesado de CR"},en:{e:"Medium, golden iris",p:"Very warty, large parotoid glands",pa:"Short and robust",c:"Massive (up to 24 cm), heaviest in CR"},fr:{e:"Moyens, iris doré",p:"Très verruqueuse, grandes glandes parotoïdes",pa:"Courtes et robustes",c:"Massif (jusqu'à 24 cm), le plus lourd du CR"}},reg:["pn","pc","ps","zn","ca"],emoji:"🏋️",img:"rhinella-marina.jpg"},
{id:16,sci:"Craugastor bransfordii",fam:"Craugastoridae",ord:"Anura",n:{es:"Rana de la Hojarasca",en:"Bransford's Litter Frog",fr:"Grenouille des feuilles mortes"},sMin:18,sMax:30,elev:"0–1,600 m",iucn:"LC",act:"diu",tox:false,type:"litter",hab:{es:"Hojarasca del suelo del bosque",en:"Forest floor leaf litter",fr:"Litière au sol de la forêt"},diet:{es:"Hormigas, ácaros, colémbolos",en:"Ants, mites, springtails",fr:"Fourmis, acariens, collemboles"},desc:{es:"La rana más común de Costa Rica. Desarrollo directo: huevos eclosionan como ranitas, sin renacuajo.",en:"The most common frog in Costa Rica. Direct development: eggs hatch as froglets, no tadpole stage.",fr:"La grenouille la plus commune du Costa Rica. Développement direct : les œufs éclosent en petites grenouilles."},fact:{es:"El típico 'tink frog' que todo visitante escucha en los bosques de CR.",en:"The typical 'tink frog' every visitor hears in Costa Rican forests.",fr:"La typique 'grenouille tink' que chaque visiteur entend dans les forêts du CR."},call:{es:"'Tink' agudo y metálico, repetido.",en:"High-pitched metallic 'tink', repeated.",fr:"'Tink' aigu et métallique, répété."},freq:"3.0–5.5 kHz",anat:{es:{e:"Grandes para su tamaño",p:"Granular, patrón críptico",pa:"Cortas, sin membranas ni ventosas",c:"Pequeño, aplanado"},en:{e:"Large for its size",p:"Granular, cryptic pattern",pa:"Short, no webbing or toe pads",c:"Small, flattened"},fr:{e:"Grands pour sa taille",p:"Granulaire, motif cryptique",pa:"Courtes, sans membranes ni ventouses",c:"Petit, aplati"}},reg:["ca","zn","ps"],emoji:"🍂",img:"craugastor-bransfordii.jpg"},
{id:17,sci:"Leptodactylus melanonotus",fam:"Leptodactylidae",ord:"Anura",n:{es:"Rana Sabinal",en:"Sabinal Frog",fr:"Grenouille sabinal"},sMin:30,sMax:50,elev:"0–1,200 m",iucn:"LC",act:"noc",tox:false,type:"ground",hab:{es:"Pozas temporales, pastizales, cunetas",en:"Temporary pools, grasslands, ditches",fr:"Mares temporaires, prairies, fossés"},diet:{es:"Insectos, invertebrados del suelo",en:"Insects, soil invertebrates",fr:"Insectes, invertébrés du sol"},desc:{es:"Rana terrestre común en áreas rurales. Construye nidos de espuma en charcos temporales.",en:"Common terrestrial frog in rural areas. Builds foam nests in temporary pools.",fr:"Grenouille terrestre commune dans les zones rurales. Construit des nids de mousse dans les mares temporaires."},fact:{es:"Bate mucosidad con sus patas traseras para construir nidos de espuma, como batir claras de huevo.",en:"Beats mucus with its hind legs to build foam nests, like whipping egg whites.",fr:"Bat du mucus avec ses pattes arrière pour construire des nids de mousse, comme battre des blancs d'œufs."},call:{es:"'Whit' agudo repetido, flotando en charcos.",en:"Sharp repeated 'whit', floating in pools.",fr:"'Whit' aigu répété, flottant dans les mares."},freq:"2.5–4.0 kHz",anat:{es:{e:"Medianos, dorados",p:"Lisa a granular, parda",pa:"Moderadas, parcialmente palmeadas",c:"Mediano, robusto"},en:{e:"Medium, golden",p:"Smooth to granular, brown",pa:"Moderate, partially webbed",c:"Medium, robust"},fr:{e:"Moyens, dorés",p:"Lisse à granulaire, brune",pa:"Modérées, partiellement palmées",c:"Moyen, robuste"}},reg:["pn","pc","ps","zn","ca"],emoji:"🌾",img:"leptodactylus-melanonotus.jpg"},
{id:18,sci:"Incilius valliceps",fam:"Bufonidae",ord:"Anura",n:{es:"Sapo del Golfo",en:"Gulf Coast Toad",fr:"Crapaud du golfe"},sMin:50,sMax:90,elev:"0–1,200 m",iucn:"LC",act:"noc",tox:true,type:"toad",hab:{es:"Áreas abiertas, borde de bosque seco",en:"Open areas, dry forest edge",fr:"Zones ouvertes, lisière de forêt sèche"},diet:{es:"Insectos, invertebrados terrestres",en:"Insects, terrestrial invertebrates",fr:"Insectes, invertébrés terrestres"},desc:{es:"Sapo robusto del Pacífico seco. Se distingue por sus prominentes crestas craneales óseas.",en:"Robust toad of the dry Pacific. Distinguished by its prominent bony cranial crests.",fr:"Crapaud robuste du Pacifique sec. Se distingue par ses crêtes crâniennes osseuses proéminentes."},fact:{es:"Las crestas craneales le dan aspecto de llevar un casco.",en:"The cranial crests give it the appearance of wearing a helmet.",fr:"Les crêtes crâniennes lui donnent l'apparence de porter un casque."},call:{es:"Trino corto y nasal 'brrrt'.",en:"Short nasal trill 'brrrt'.",fr:"Trille court et nasal 'brrrt'."},freq:"1.5–3.0 kHz",anat:{es:{e:"Medianos, iris dorado",p:"Verrugosa, crestas craneales prominentes",pa:"Cortas y robustas",c:"Mediano-grande, con crestas óseas"},en:{e:"Medium, golden iris",p:"Warty, prominent cranial crests",pa:"Short and robust",c:"Medium-large, with bony crests"},fr:{e:"Moyens, iris doré",p:"Verruqueuse, crêtes crâniennes proéminentes",pa:"Courtes et robustes",c:"Moyen-grand, avec crêtes osseuses"}},reg:["ca","zn"],emoji:"🏛️",img:"incilius-valliceps.jpg"},
{id:19,sci:"Pristimantis ridens",fam:"Strabomantidae",ord:"Anura",n:{es:"Rana Ladrona Pigmea",en:"Pygmy Robber Frog",fr:"Grenouille voleuse pygmée"},sMin:20,sMax:28,elev:"0–1,500 m",iucn:"LC",act:"noc",tox:false,type:"litter",hab:{es:"Vegetación baja y hojarasca en bosque húmedo",en:"Low vegetation and leaf litter in moist forest",fr:"Végétation basse et litière en forêt humide"},diet:{es:"Insectos diminutos, ácaros",en:"Tiny insects, mites",fr:"Insectes minuscules, acariens"},desc:{es:"Pequeña rana nocturna entre la vegetación baja del bosque. Desarrollo directo.",en:"Small nocturnal frog in low forest vegetation. Direct development.",fr:"Petite grenouille nocturne dans la végétation basse de la forêt. Développement direct."},fact:{es:"'Ridens' significa 'riendo' en latín, por su canto que recuerda una risa suave.",en:"'Ridens' means 'laughing' in Latin, for its call resembling a soft laugh.",fr:"'Ridens' signifie 'riant' en latin, pour son chant rappelant un rire doux."},call:{es:"'Chirp' agudo y corto, repetido irregularmente.",en:"Short, sharp 'chirp', irregularly repeated.",fr:"'Chirp' aigu et court, répété irrégulièrement."},freq:"4.0–6.5 kHz",anat:{es:{e:"Relativamente grandes, pardo-dorado",p:"Granular, parda críptica",pa:"Cortas con discos digitales pequeños",c:"Diminuto, desarrollo directo"},en:{e:"Relatively large, brownish-golden",p:"Granular, cryptic brown",pa:"Short with small digital discs",c:"Tiny, direct development"},fr:{e:"Relativement grands, brun doré",p:"Granulaire, brun cryptique",pa:"Courtes avec petits disques digitaux",c:"Minuscule, développement direct"}},reg:["ca","zn","ps"],emoji:"🤏",img:"pristimantis-ridens.jpg"},

// Build the photos array for a species (PDF hero + iNaturalist gallery)

      ${src ? `<img class="list-photo" src="${src}" alt="${s.sci}">` : `<span class="list-photo" style="display:flex;align-items:center;justify-content:center;font-size:22px">${s.emoji}</span>`}
      <div class="list-names"><div class="list-common">${s.n[lang]}</div><div class="list-sci">${s.sci}</div></div>
      <button class="list-snd${hasAudio(s.id)?'':' noaudio'}" onclick="event.stopPropagation();QS(${s.id},this)" title="${hasAudio(s.id)?t('playCall'):t('noAudio')}">${hasAudio(s.id)?'🔊':'🔇'}</button>
      <span class="list-size">${s.sMin}–${s.sMax} mm</span>
    </div>`;
  }).join('');
}

function switchView(v) {
  view = v;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view===v));
  document.getElementById('grid-view').style.display = v==='grid' ? 'grid' : 'none';
  document.getElementById('list-view').style.display = v==='list' ? 'block' : 'none';
  const q = document.getElementById('search').value.toLowerCase();
  if (v==='list') renderList(q); else renderGrid(q);
}

// ======================================================
// DETAIL
// ======================================================
window.D = function(id) {
  const s = SP.find(x => x.id===id);
  if (!s) return;
  curIdx = SP.indexOf(s);
  document.getElementById('det-num').textContent = `#${String(s.id).padStart(3,'0')}`;
  document.getElementById('det-name').textContent = s.n[lang];

  // Photo gallery (PDF hero + iNaturalist multi-angle) + 3D viewer tab
  const photoPanel = document.getElementById('det-photo');
  const has3d = !!MODELS[s.id];
  photoPanel.innerHTML = `
    <div class="det-viewer-tabs">
      <button class="vtab active" data-m="photos" onclick="vtab('photos')">🖼️ ${t('photos')} <span class="vtab-n">${photosOf(s).length}</span></button>
      <button class="vtab vtab-3d" data-m="3d" ${has3d?`onclick="vtab('3d')"`:`disabled title="${t('soon3d')}"`}>🧊 360° / 3D${has3d?` <span class="vtab-n vtab-new">NEW</span>`:''}</button>
    </div>
    <div id="det-viewer-body">${photoBodyHTML(s)}</div>`;

  // Bio
  document.getElementById('det-bio').innerHTML = `
    <div class="bio-card"><h3>${t('bioData')}</h3>
      <div class="bio-row"><span class="bio-label">${t('sciName')}</span><span class="bio-val sci">${s.sci}</span></div>
      <div class="bio-row"><span class="bio-label">${t('engName')}</span><span class="bio-val">${s.n.en}</span></div>
      <div class="bio-row"><span class="bio-label">${t('family')}</span><span class="bio-val">${s.fam}</span></div>
      <div class="bio-row"><span class="bio-label">${t('order')}</span><span class="bio-val">${s.ord}</span></div>
      <div class="bio-row"><span class="bio-label">${t('sizeSVL')}</span><span class="bio-val">${s.sMin}–${s.sMax} mm</span></div>
      <div class="bio-row"><span class="bio-label">${t('elevation')}</span><span class="bio-val">${s.elev}</span></div>
      <div class="bio-row"><span class="bio-label">${t('habitat')}</span><span class="bio-val">${s.hab[lang]}</span></div>
      <div class="bio-row"><span class="bio-label">${t('activity')}</span><span class="bio-val">${s.act==='noc'?t('nocturnalTag'):t('diurnalTag')}</span></div>
      <div class="bio-row"><span class="bio-label">${t('diet')}</span><span class="bio-val">${s.diet[lang]}</span></div>
      <div class="bio-row"><span class="bio-label">${t('iucnStatus')}</span><span class="bio-val"><span class="card-iucn iucn-${s.iucn.toLowerCase()}" style="font-size:11px">${s.iucn==='LC'?t('leastConcern'):t('dataDeficient')}</span></span></div>
      <div style="margin-top:8px;display:flex;gap:4px;flex-wrap:wrap">
        <span class="tag ${s.act==='noc'?'tag-noc':'tag-diu'}">${s.act==='noc'?'🌙 '+t('nocturnalTag'):'☀️ '+t('diurnalTag')}</span>
        ${s.type==='tree'||s.type==='glass'?`<span class="tag tag-arb">🌳 ${t('arboreal')}</span>`:''}
        ${['litter','ground','toad','narrow','true'].includes(s.type)?`<span class="tag tag-ter">🌍 ${t('terrestrial')}</span>`:''}
        ${s.tox?`<span class="tag tag-tox">☠️ ${t('toxicTag')}</span>`:''}
      </div>
    </div>
    <div class="bio-card"><h3>${t('description')}</h3>
      <p class="bio-desc">${s.desc[lang]}</p>
      <p class="bio-fact">💡 ${s.fact[lang]}</p>
    </div>`;

  // Sound — local players (Xeno-Canto primary + iNaturalist complementary)
  const recs = AUDIO[s.id] || [];
  let sndHtml = `<h3>🔊 ${t('sound')}</h3>
    <div class="snd-desc"><strong>${t('callType')}:</strong> ${s.call[lang]}<br><strong>${t('frequency')}:</strong> ${s.freq}</div>`;
  if(recs.length){
    sndHtml += `<div class="snd-list">` + recs.map(r => {
      const srcClass = r.src==='Xeno-Canto' ? 'xc' : 'inat';
      const cred = `${r.by?('© '+r.by+' · '):''}${r.lic||''}${r.url?` · <a href="${r.url}" target="_blank" rel="noopener">${r.xc?('XC'+r.xc):'fuente'}</a>`:''}`;
      return `<div class="snd-item">
        <div class="snd-item-head">
          <span class="snd-src snd-src-${srcClass}">${r.src}</span>
          ${r.type?`<span class="snd-type">${r.type}</span>`:''}
          ${r.loc?`<span class="snd-loc">📍 ${shortLoc(r.loc)}</span>`:''}
        </div>
        <audio controls preload="none" src="audio/${r.f}"></audio>
        <div class="snd-cred">${cred}</div>
      </div>`;
    }).join('') + `</div>`;
  } else {
    sndHtml += `<p class="snd-none">🔇 ${t('noAudio')}</p>`;
  }
  document.getElementById('det-snd').innerHTML = sndHtml;

  // Anatomy
  const a = s.anat[lang];
  document.getElementById('det-anat').innerHTML = `<h3>${t('anatomy')}</h3>
    <div class="anat-grid">
      <div class="anat-item"><h4>👁️ ${t('eyes')}</h4><p>${a.e}</p></div>
      <div class="anat-item"><h4>🧬 ${t('skin')}</h4><p>${a.p}</p></div>
      <div class="anat-item"><h4>🦶 ${t('legs')}</h4><p>${a.pa}</p></div>
      <div class="anat-item"><h4>🫀 ${t('bodyA')}</h4><p>${a.c}</p></div>
    </div>`;

  // Size
  renderSize(s);

  // Map
  renderMap(s);

  document.getElementById('detail').classList.add('open');
  document.getElementById('detail').scrollTop = 0;
};

window.closeD = () => document.getElementById('detail').classList.remove('open');
window.navSp = d => { let i = curIdx+d; if(i<0) i=SP.length-1; if(i>=SP.length) i=0; D(SP[i].id); };

// Photo navigation
window.setPhoto = i => { const p=window._photos; if(!p||!p[i]) return; window._photoIdx=i; document.getElementById('main-img').src=p[i].url; document.querySelectorAll('.det-photo-thumbs img').forEach((t,j)=>t.classList.toggle('active',j===i)); const cr=document.getElementById('det-photo-credit'); if(cr) cr.innerHTML = p[i].link?`${p[i].attr} · <a href="${p[i].link}" target="_blank" rel="noopener">${t('viewObs')}</a>`:p[i].attr; const pc=document.querySelector('.photo-count'); if(pc) pc.textContent=`${i+1} / ${p.length}`; };
window.navPhoto = d => { const p=window._photos; if(!p) return; let i=window._photoIdx+d; if(i<0)i=p.length-1; if(i>=p.length)i=0; setPhoto(i); };

// Lightbox
window.openLB = src => { document.getElementById('lb-img').src=src; document.getElementById('lightbox').classList.add('open'); };
document.getElementById('lightbox').addEventListener('click', () => document.getElementById('lightbox').classList.remove('open'));

// Size comparison
function renderSize(s) {
  const avg = (s.sMin+s.sMax)/2, avgIn = (avg/25.4).toFixed(1), px=2.2;
  const c = COINS[coinIdx];
  const fw = Math.max(Math.min(avg*px,170),34), fh = fw*0.66;
  const cd = Math.max(c.d*px,18);
  const src = getPhotoUrl(s);
  const frogVisual = src
    ? `<div class="size-frog-photo" style="width:${fw}px;height:${fh}px"><img src="${src}" alt="${s.sci}"></div>`
    : `<div class="size-circle size-frog" style="width:${fw}px;height:${fh}px;font-size:${Math.min(fw*.4,50)}px">${s.emoji}</div>`;
  document.getElementById('det-size').innerHTML = `<h3>📏 ${t('sizeComp')}</h3>
    <p style="font-size:12px;color:var(--text2);margin-bottom:8px">${t('avgSize')}: <b>${avg.toFixed(0)} mm</b> (${avgIn} in) · ${t('range')}: ${s.sMin}–${s.sMax} mm</p>
    <div class="size-display">
      <div class="size-item">${frogVisual}<span class="size-label">${s.n[lang]}<br><b>${avg.toFixed(0)} mm</b></span></div>
      <div style="font-size:16px;color:var(--text3);align-self:center;padding-bottom:18px">vs</div>
      <div class="size-item"><div class="size-circle size-coin" style="width:${cd}px;height:${cd}px;font-size:${Math.max(cd*.2,8)}px">${c.n}</div><span class="size-label">${c.l}<br><b>${c.d} mm</b></span></div>
    </div>
    <div class="size-btns">${COINS.map((c,i)=>`<button class="size-btn ${i===coinIdx?'active':''}" onclick="window.setCoin(${i})">${c.n} (${c.d}mm)</button>`).join('')}</div>`;
}
window.setCoin = i => { coinIdx=i; if(curIdx>=0) renderSize(SP[curIdx]); };

// Map — accurate Costa Rica outline divided into biogeographic regions
function renderMap(s) {
  const countryD = polyPath(COUNTRY);
  // Region fills (clipped to country outline)
  const regionPaths = Object.entries(REGIONS).map(([k,v]) => {
    const on = s.reg.includes(k);
    return `<path d="${polyPath(v.poly)}" fill="${on?v.c:'#e6e2d8'}" fill-opacity="${on?.92:.55}" clip-path="url(#crclip)"><title>${v[lang]}</title></path>`;
  }).join('');
  // Region labels at centroids
  const labels = Object.entries(REGIONS).map(([k,v]) => {
    const on = s.reg.includes(k);
    const [lx,ly] = mproj(v.lab[0], v.lab[1]);
    return `<text x="${lx}" y="${ly}" text-anchor="middle" font-size="${on?'10.5':'9'}" font-weight="${on?'700':'500'}" fill="${on?'#fff':'#9a958a'}" font-family="Source Sans 3,sans-serif" style="paint-order:stroke;stroke:${on?'rgba(0,0,0,.35)':'rgba(255,255,255,.6)'};stroke-width:${on?'2.5':'2'}px;stroke-linejoin:round">${v[lang]}</text>`;
  }).join('');
  // Group regions by slope (vertiente) for the legend
  const bySlope = sl => Object.entries(REGIONS).filter(([k,v])=>v.slope===sl);
  const legendItem = ([k,v]) => { const on=s.reg.includes(k);
    return `<div class="map-prov"><span class="map-dot" style="background:${on?v.c:'var(--border)'}"></span><span style="${on?'font-weight:600;color:var(--text)':'color:var(--text3)'}">${v[lang]}</span>${on?' <span style="color:var(--green)">✓</span>':''}</div>`; };
  document.getElementById('det-map').innerHTML = `<h3>🗺️ ${t('distribution')}</h3>
    <div class="map-wrap">
      <div class="map-svg"><svg viewBox="0 0 ${MAP_VBW} ${MAP_VBH}" xmlns="http://www.w3.org/2000/svg">
        <defs><clipPath id="crclip"><path d="${countryD}"/></clipPath></defs>
        <rect x="0" y="0" width="${MAP_VBW}" height="${MAP_VBH}" fill="#dceff4" rx="6"/>
        <path d="${countryD}" fill="#f3f0e8"/>
        ${regionPaths}
        <path d="${countryD}" fill="none" stroke="#2d3a35" stroke-width="1.6" stroke-linejoin="round"/>
        ${labels}
      </svg></div>
      <div class="map-info">
        <div style="margin-bottom:8px"><h4 style="font-size:11px;color:var(--green);margin-bottom:4px;letter-spacing:.5px">⛰️ ${SLOPES.pac[lang]}</h4>${bySlope('pac').map(legendItem).join('')}</div>
        <div><h4 style="font-size:11px;color:var(--green);margin-bottom:4px;letter-spacing:.5px">🌊 ${SLOPES.car[lang]}</h4>${bySlope('car').map(legendItem).join('')}</div>
        <div class="map-elev"><strong>${t('elevRange')}:</strong> ${s.elev}</div>
      </div>
    </div>`;
}

// ======================================================
// LOCAL AUDIO (Xeno-Canto + iNaturalist, hosted locally)
// ======================================================
let AUDIO = {}, GALLERY = {};
const audioEl = new Audio();
let qsBtn = null, qsFile = null;
async function loadAudioManifest(){ try { const r = await fetch('audio/manifest.json'); AUDIO = await r.json(); } catch(e){ AUDIO = {}; } }
async function loadGalleryManifest(){ try { const r = await fetch('img/gallery_manifest.json'); GALLERY = await r.json(); } catch(e){ GALLERY = {}; } }
function hasAudio(id){ const a = AUDIO[id]; return !!(a && a.length); }
function shortLoc(loc){ if(!loc) return ''; const parts = loc.split(',').map(s=>s.trim()).filter(Boolean); return parts.slice(-2).join(', '); }
function clearPlaying(){ document.querySelectorAll('.card-sound.playing,.list-snd.playing').forEach(b=>b.classList.remove('playing')); }
// Inline quick-play from grid cards / list rows (plays the primary recording)
window.QS = (id, btn) => {
  const recs = AUDIO[id];
  if(!recs || !recs.length) return;
  const file = 'audio/' + recs[0].f;
  if(qsFile === file && !audioEl.paused){ audioEl.pause(); clearPlaying(); qsFile=null; return; }
  clearPlaying();
  // pause any detail players
  document.querySelectorAll('#det-snd audio').forEach(a=>a.pause());
  audioEl.src = file; qsFile = file; qsBtn = btn;
  audioEl.play().then(()=>{ if(btn) btn.classList.add('playing'); }).catch(()=>{});
};
audioEl.addEventListener('ended', () => { clearPlaying(); qsFile=null; });
audioEl.addEventListener('pause', () => { if(qsBtn) qsBtn.classList.remove('playing'); });
// Only one audio element plays at a time (detail players + inline)
document.addEventListener('play', e => {
  if(e.target.tagName==='AUDIO'){
    document.querySelectorAll('audio').forEach(a => { if(a!==e.target) a.pause(); });
    if(audioEl!==e.target){ audioEl.pause(); clearPlaying(); qsFile=null; }
  }
}, true);

// ======================================================
// LANGUAGE
// ======================================================
function applyLang() {
  document.querySelectorAll('[data-t]').forEach(el => { const k=el.dataset.t; if(UI[lang][k]) el.textContent=UI[lang][k]; });
  document.querySelectorAll('[data-t-ph]').forEach(el => { const k=el.dataset.tPh; if(UI[lang][k]) el.placeholder=UI[lang][k]; });
  document.querySelectorAll('.lang-btn').forEach(x => x.classList.toggle('active', x.dataset.lang===lang));
  document.title = UI[lang].title + ' — ' + UI[lang].subtitle;
  const q = document.getElementById('search').value.toLowerCase();
  if(view==='grid') renderGrid(q); else renderList(q);
  // Re-render open detail in the new language (preserve scroll)
  const det = document.getElementById('detail');
  if(det.classList.contains('open') && curIdx>=0){ const sc=det.scrollTop; D(SP[curIdx].id); det.scrollTop=sc; }
}

// ======================================================
// EVENTS
// ======================================================
document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => {
  lang = b.dataset.lang;
  applyLang();
}));
document.querySelectorAll('.nav-btn').forEach(b => b.addEventListener('click', () => switchView(b.dataset.view)));
document.querySelectorAll('.pill').forEach(p => p.addEventListener('click', () => {
  filter = p.dataset.f;
  document.querySelectorAll('.pill').forEach(x => x.classList.toggle('active', x===p));
  const q = document.getElementById('search').value.toLowerCase();
  if(view==='grid') renderGrid(q); else renderList(q);
}));
document.getElementById('search').addEventListener('input', e => { const q=e.target.value.toLowerCase(); if(view==='grid') renderGrid(q); else renderList(q); });
document.getElementById('det-close').addEventListener('click', closeD);
document.getElementById('det-prev').addEventListener('click', () => navSp(-1));
document.getElementById('det-next').addEventListener('click', () => navSp(1));
document.addEventListener('keydown', e => {
  if(document.getElementById('detail').classList.contains('open')){
    if(e.key==='Escape') closeD();
    else if(e.key==='ArrowLeft') navSp(-1);
    else if(e.key==='ArrowRight') navSp(1);
  }
  if(document.getElementById('lightbox').classList.contains('open') && e.key==='Escape') document.getElementById('lightbox').classList.remove('open');
});

// ======================================================
// INIT
// ======================================================
await Promise.all([loadAudioManifest(), loadGalleryManifest()]);
applyLang();
</script>
</body>
</html>
